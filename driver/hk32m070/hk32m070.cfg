# OpenOCD configuration for HK32M070
# This is a custom target file for HK32M070 (Cortex-M0)

source [find target/swj-dp.tcl]

if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME hk32m070
}

if { [info exists ENDIAN] } {
    set _ENDIAN $ENDIAN
} else {
    set _ENDIAN little
}

# Work-area is RAM
if { [info exists WORKAREASIZE] } {
    set _WORKAREASIZE $WORKAREASIZE
} else {
    set _WORKAREASIZE 0x1000
}

# JTAG speed
adapter_khz 1000

# SWD interface
transport select swj-dp

# Cortex-M0 target
set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian $_ENDIAN -chain-position $_CHIPNAME.dap

$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

# Flash configuration
set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME stm32f1x 0x08000000 0x8000 0 0 $_TARGETNAME

# Reset configuration
$_TARGETNAME configure -event reset-init {
    # Set up clocks after reset
    mww 0x40021000 0x00000083  ;# RCC_CR - Enable HSI
    mww 0x40021004 0x001D0400  ;# RCC_CFGR - PLL config
    mww 0x40021000 0x01000083  ;# RCC_CR - Enable PLL
}

# GDB setup
$_TARGETNAME configure -event gdb-attach {
    reset init
}

$_TARGETNAME configure -event gdb-detach {
    resume
}
